<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProofPlate 🍽️ — Select Role</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-container {
      background: var(--clr-surface);
      border-radius: var(--radius-xl);
      border: 1px solid var(--clr-border);
      padding: 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.6s ease both;
    }
    .role-logo {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .selection-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--clr-text);
      margin-bottom: 20px;
    }
    .role-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }
    .btn-role {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-md);
      border: 2px solid var(--clr-border);
      background: var(--clr-bg);
      font-weight: 600;
      color: var(--clr-text-soft);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-role:hover {
      border-color: var(--clr-accent);
      color: var(--clr-accent);
    }
    .btn-role.selected {
      background: var(--clr-accent-light);
      border-color: var(--clr-accent);
      color: var(--clr-accent);
    }
    
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--clr-border);
      font-size: 0.95rem;
      background: var(--clr-bg);
      transition: all var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--clr-accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .btn-login {
      margin-top: 8px;
      padding: 14px;
      border-radius: var(--radius-md);
      background: var(--clr-text);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-login:hover {
      background: var(--clr-accent);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="role-logo">🍽️</div>
    <p class="selection-text">What are you entering as?</p>
    
    <div class="role-buttons">
      <button class="btn-role" id="roleCustomer" onclick="selectRole('customer')">Customer</button>
      <button class="btn-role" id="roleKitchen" onclick="selectRole('kitchen')">Cloud Kitchen</button>
    </div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <input type="email" class="form-input" placeholder="Email address" required>
      <input type="password" class="form-input" placeholder="Password" required>
      <button type="submit" class="btn-login">Login</button>
    </form>
  </div>

  <script>
    function selectRole(role) {
      // Store in localStorage
      localStorage.setItem("role", role);
      
      // Update UI
      document.getElementById('roleCustomer').classList.toggle('selected', role === 'customer');
      document.getElementById('roleKitchen').classList.toggle('selected', role === 'kitchen');
    }

    function handleLogin(event) {
      event.preventDefault();
      
      const role = localStorage.getItem("role");
      
      if (!role) {
        alert("Please select a role first!");
        return;
      }

      // Redirect based on role
      if (role === 'customer') {
        window.location.href = "user.html";
      } else if (role === 'kitchen') {
        window.location.href = "dashboard.html";
      }
    }

    // Default selection
    if (localStorage.getItem("role")) {
      selectRole(localStorage.getItem("role"));
    }
  </script>

</body>
</html>
