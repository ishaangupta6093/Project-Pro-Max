<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProofPlate 🍽️ — Select Role</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-container {
      background: var(--clr-surface);
      border-radius: var(--radius-xl);
      border: 1px solid var(--clr-border);
      padding: 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.6s ease both;
    }
    .role-logo {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .selection-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--clr-text);
      margin-bottom: 20px;
    }
    .role-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }
    .btn-role {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-md);
      border: 2px solid var(--clr-border);
      background: var(--clr-bg);
      font-weight: 600;
      color: var(--clr-text-soft);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-role:hover {
      border-color: var(--clr-accent);
      color: var(--clr-accent);
    }
    .btn-role.selected {
      background: var(--clr-accent-light);
      border-color: var(--clr-accent);
      color: var(--clr-accent);
    }
    
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--clr-border);
      font-size: 0.95rem;
      background: var(--clr-bg);
      transition: all var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--clr-accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .btn-login {
      margin-top: 8px;
      padding: 14px;
      border-radius: var(--radius-md);
      background: var(--clr-text);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-login:hover {
      background: var(--clr-accent);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="role-logo">🍽️</div>
    <p class="selection-text">What are you entering as?</p>
    
    <div class="role-buttons">
      <button class="btn-role" id="roleCustomer" onclick="selectRole('customer')">Customer</button>
      <button class="btn-role" id="roleKitchen" onclick="selectRole('kitchen')">Cloud Kitchen</button>
    </div>

    <div id="loginForm" class="login-form">
      <div id="phoneSection">
        <label style="font-size: 0.85rem; font-weight: 600; color: var(--clr-text-soft); margin-bottom: 4px; display: block;">WhatsApp Number</label>
        <input type="tel" id="phoneInput" class="form-input" placeholder="+91 98765 43210" required>
        <button type="button" id="sendOtpBtn" class="btn-login" onclick="sendOtp()" style="width: 100%; margin-top: 12px;">Send Code via WhatsApp</button>
      </div>

      <div id="otpSection" style="display: none;">
        <label style="font-size: 0.85rem; font-weight: 600; color: var(--clr-text-soft); margin-bottom: 4px; display: block;">Enter 6-Digit Code</label>
        <input type="text" id="otpInput" class="form-input" placeholder="000000" maxlength="6">
        <button type="button" id="verifyOtpBtn" class="btn-login" onclick="verifyOtp()" style="width: 100%; margin-top: 12px; background: var(--clr-accent);">Verify & Login</button>
        <button type="button" class="btn-role" onclick="resetLogin()" style="width: 100%; margin-top: 8px; border: none; font-size: 0.85rem;">Change number</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    function selectRole(role) {
      localStorage.setItem("role", role);
      document.getElementById('roleCustomer').classList.toggle('selected', role === 'customer');
      document.getElementById('roleKitchen').classList.toggle('selected', role === 'kitchen');
    }

    async function sendOtp() {
      const phone = document.getElementById('phoneInput').value.trim();
      const role = localStorage.getItem("role");

      if (!role) {
        alert("Please select a role first!");
        return;
      }
      if (!phone) {
        alert("Please enter your phone number.");
        return;
      }

      const btn = document.getElementById('sendOtpBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(`${API_BASE}/auth/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('phoneSection').style.display = 'none';
          document.getElementById('otpSection').style.display = 'block';
        } else {
          alert(data.error || "Failed to send OTP. Check console for debug info.");
          btn.disabled = false;
          btn.textContent = 'Send Code via WhatsApp';
        }
      } catch (err) {
        console.error(err);
        alert("Server error. Make sure backend is running!");
        btn.disabled = false;
        btn.textContent = 'Send Code via WhatsApp';
      }
    }

    async function verifyOtp() {
      const phone = document.getElementById('phoneInput').value.trim();
      const otp = document.getElementById('otpInput').value.trim();
      const role = localStorage.getItem("role");

      const btn = document.getElementById('verifyOtpBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const res = await fetch(`${API_BASE}/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, otp, role })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('userPhone', phone);
          window.location.href = role === 'customer' ? "user.html" : "dashboard.html";
        } else {
          alert(data.error || "Invalid OTP.");
          btn.disabled = false;
          btn.textContent = 'Verify & Login';
        }
      } catch (err) {
        console.error(err);
        alert("Verification failed.");
        btn.disabled = false;
        btn.textContent = 'Verify & Login';
      }
    }

    function resetLogin() {
      document.getElementById('phoneSection').style.display = 'block';
      document.getElementById('otpSection').style.display = 'none';
      document.getElementById('sendOtpBtn').disabled = false;
      document.getElementById('sendOtpBtn').textContent = 'Send Code via WhatsApp';
    }

    // Default selection
    if (localStorage.getItem("role")) {
      selectRole(localStorage.getItem("role"));
    }
  </script>
<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<!-- ProofPlate Config -->
<script src="js/firebase-config.js"></script>
<script src="js/services/auth.service.js"></script>

</body>
</html>
